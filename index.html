<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول إلى فيسبوك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    /* Reset and global styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* استخدام خطوط فيسبوك الرسمية */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      background: #fff;
      color: #1c1e21;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      justify-content: space-between;
    }

    /* Header styling */
    .header {
      width: 100%;
      height: 50px;
      padding: 10px 16px;
      display: flex;
      justify-content: center; 
      align-items: center;
    }
    
    .language-selector {
      display: flex;
      align-items: center;
      color: #575c61;
      font-size: 14.5px;
      gap: 6px;
      cursor: pointer;
    }

    /* Main body styling */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      padding: 20px 16px 0;
    }

    .content-wrapper {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* شعار فيسبوك المحدث والمطابق للصورة */
    .logo-container {
      width: 72px;
      height: 72px;
      border: 1px solid #ccd0d5;
      border-radius: 50%;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
      margin-top: 10px;
    }
    
    .fb-logo-svg {
      width: 42px;
      height: 42px;
      fill: #0866ff;
      margin-top: 5px;
      margin-left: 8px; /* إزاحة طفيفة ليطابق التصميم الأصلي */
    }

    /* خانات الإدخال */
    .input-group {
      width: 100%;
      margin-bottom: 15px;
    }
    
    input {
      width: 100%;
      padding: 15px 16px;
      margin-bottom: 12px;
      border: 1px solid #ccd0d5;
      border-radius: 14px; 
      font-size: 15px;
      color: #1c1e21;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    
    input:focus {
      border-color: #1877f2;
    }

    input::placeholder {
      color: #757a82;
      font-weight: 400;
    }

    /* الأزرار */
    button {
      cursor: pointer;
      font-weight: 500;
      border-radius: 24px; 
      font-size: 15px;
      width: 100%;
      padding: 13px;
      text-align: center;
      transition: background 0.1s ease;
      font-family: inherit;
    }

    .login-btn {
      background-color: #0866ff; 
      color: #fff;
      border: none;
      margin-bottom: 25px;
    }
    
    .login-btn:hover {
      background-color: #075ce5;
    }

    .forgot-link {
      color: #1c1e21;
      font-size: 14.5px;
      text-decoration: none;
      margin-bottom: 40px;
      font-weight: 500;
    }

    /* القسم السفلي */
    .create-account-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 20px;
    }
    
    .create-btn {
      background-color: #fff;
      color: #0866ff;
      border: 1px solid #0866ff;
      margin-bottom: 25px;
    }

    .meta-footer {
      color: #1c1e21;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      direction: ltr; 
      font-weight: 500;
    }
    
    .meta-logo-img {
      width: 20px;
      height: auto;
    }

    /* === تصميم قائمة اللغات المطابق للصورة الثانية === */
    .lang-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: flex-end; /* لظهور النافذة من الأسفل */
    }

    .lang-bottom-sheet {
      background: #fff;
      width: 100%;
      height: 85vh; /* ارتفاع النافذة */
      border-radius: 24px 24px 0 0;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    /* رأس قائمة اللغات */
    .lang-header {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end; /* محاذاة لليمين */
    }

    .close-btn {
      cursor: pointer;
      margin-bottom: 12px;
      color: #000;
    }

    .lang-title {
      font-size: 22px;
      font-weight: bold;
      color: #1c1e21;
      margin: 0;
      text-align: right;
    }

    /* قائمة اللغات والتمرير */
    .lang-list {
      overflow-y: auto;
      padding: 0 10px 20px;
      flex-grow: 1;
    }

    /* عنصر اللغة الواحد (النص يمين والمربع يسار) */
    .lang-item {
      display: flex;
      flex-direction: row-reverse; /* يجبر النص على اليمين والمربع على اليسار */
      justify-content: space-between;
      align-items: center;
      padding: 16px 10px;
      border-bottom: 1px solid #f0f2f5;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .lang-text {
      font-size: 16px;
      color: #1c1e21;
    }

    /* تصميم مربع الاختيار */
    .checkbox {
      width: 22px;
      height: 22px;
      border: 1.5px solid #8d949e;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lang-item.active .checkbox {
      background-color: #0866ff;
      border-color: #0866ff;
    }

    .lang-item.active .checkbox::after {
      content: '';
      width: 5px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }

  </style>
</head>
<body>

  <div class="lang-modal-overlay" id="lang-modal" onclick="closeLangModalOverlay(event)">
    <div class="lang-bottom-sheet">
      <div class="lang-header">
        <span class="close-btn" onclick="closeLangModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </span>
        <h2 class="lang-title">تحديد لغتك</h2>
      </div>
      <div class="lang-list" id="lang-list-container">
        </div>
    </div>
  </div>

  <div class="header">
    <div class="language-selector" onclick="openLangModal()">
      <span id="current-lang-display">العربية</span>
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L5 5L9 1" stroke="#575c61" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
  
  <main>
    <div class="content-wrapper">
      <div class="logo-container">
        <svg viewBox="0 0 32 32" class="fb-logo-svg">
          <path d="M22.95 32l.84-6.47h-6.28v-4.2c0-1.77.94-3.5 3.65-3.5h2.84V12.31s-2.58-.44-5.05-.44c-5.15 0-8.51 3.12-8.51 8.76v4.9H4.86V32h5.58V50h6.23V32h6.28z"/>
        </svg>
      </div>
      
      <div class="input-group">
        <input type="text" id="email" placeholder="رقم الهاتف المحمول أو البريد الإلكتروني" name="email">
        <input type="password" id="password" placeholder="كلمة السر" name="password">
      </div>
      
      <button class="login-btn" id="login-btn" onclick="captureLogin()">تسجيل الدخول</button>
      <a href="#" class="forgot-link" id="forgot-link">هل نسيت كلمة السر؟</a>
    </div>
  </main>
  
  <div class="create-account-container">
    <div class="content-wrapper">
      <button class="create-btn" id="create-btn">إنشاء حساب جديد</button>
      <div class="meta-footer">
        <img src="meta-logo.png" alt="Meta Logo" class="meta-logo-img">
        <span>Meta</span>
      </div>
    </div>
  </div>

  <script>
    // اللغات الحقيقية الأربع فقط التي تغير النصوص والاتجاهات
    const realTranslations = {
      'ar': {
        'langText': 'العربية', 'emailPH': 'رقم الهاتف المحمول أو البريد الإلكتروني', 'passPH': 'كلمة السر',
        'loginBtn': 'تسجيل الدخول', 'forgotLnk': 'هل نسيت كلمة السر؟', 'createBtn': 'إنشاء حساب جديد', 'dir': 'rtl'
      },
      'en': {
        'langText': 'English (US)', 'emailPH': 'Mobile number or email address', 'passPH': 'Password',
        'loginBtn': 'Log In', 'forgotLnk': 'Forgotten password?', 'createBtn': 'Create new account', 'dir': 'ltr'
      },
      'hi': {
        'langText': 'हिन्दी', 'emailPH': 'मोबाइल नंबर या ईमेल पता', 'passPH': 'पासवर्ड',
        'loginBtn': 'लॉग इन करें', 'forgotLnk': 'पासवर्ड भूल गए?', 'createBtn': 'नया अकाउंट बनाएँ', 'dir': 'ltr'
      },
      'zh': {
        'langText': '中文(简体)', 'emailPH': '手机号或电子邮箱', 'passPH': '密码',
        'loginBtn': '登录', 'forgotLnk': '忘记密码？', 'createBtn': '新建帐户', 'dir': 'ltr'
      }
    };

    // القائمة الضخمة من اللغات (الواجهة) وكيفية ارتباطها باللغات الحقيقية
    const languagesData = [
      { id: 'ar', name: 'العربية', target: 'ar' },
      { id: 'en', name: 'English (US)', target: 'en' },
      { id: 'fr', name: 'Français (France)', target: 'en' },
      { id: 'tr', name: 'Türkçe', target: 'en' },
      { id: 'es', name: 'Español', target: 'en' },
      { id: 'id', name: 'Bahasa Indonesia', target: 'en' },
      { id: 'de', name: 'Deutsch', target: 'en' },
      { id: 'af', name: 'Afrikaans', target: 'en' },
      { id: 'hi', name: 'हिन्दी', target: 'hi' },
      { id: 'zh', name: '中文(简体)', target: 'zh' },
      { id: 'ur', name: 'اردو', target: 'ar' },
      { id: 'fa', name: 'فارسی', target: 'ar' },
      { id: 'ps', name: 'پښتو', target: 'ar' },
      { id: 'it', name: 'Italiano', target: 'en' },
      { id: 'pt', name: 'Português (Brasil)', target: 'en' },
      { id: 'ru', name: 'Русский', target: 'en' },
      { id: 'ja', name: '日本語', target: 'zh' },
      { id: 'ko', name: '한국어', target: 'zh' },
      { id: 'vi', name: 'Tiếng Việt', target: 'zh' },
      { id: 'th', name: 'ภาษาไทย', target: 'zh' },
      { id: 'bn', name: 'বাংলা', target: 'hi' },
      { id: 'mr', name: 'मराठी', target: 'hi' },
      { id: 'ne', name: 'नेपाली', target: 'hi' },
      { id: 'ta', name: 'தமிழ்', target: 'hi' },
      { id: 'te', name: 'తెలుగు', target: 'hi' },
      { id: 'uk', name: 'Українська', target: 'en' },
      { id: 'nl', name: 'Nederlands', target: 'en' },
      { id: 'pl', name: 'Polski', target: 'en' },
      { id: 'sv', name: 'Svenska', target: 'en' },
      { id: 'el', name: 'Ελληνικά', target: 'en' },
      { id: 'he', name: 'עברית', target: 'ar' }
    ];

    let currentLangId = 'ar';
    const modal = document.getElementById('lang-modal');
    const listContainer = document.getElementById('lang-list-container');

    // توليد عناصر القائمة
    function renderLanguages() {
      listContainer.innerHTML = '';
      languagesData.forEach(lang => {
        const item = document.createElement('div');
        item.className = `lang-item ${lang.id === currentLangId ? 'active' : ''}`;
        item.onclick = () => selectLanguage(lang.id, lang.target, lang.name);
        
        item.innerHTML = `
          <span class="lang-text">${lang.name}</span>
          <div class="checkbox"></div>
        `;
        listContainer.appendChild(item);
      });
    }

    function openLangModal() {
      renderLanguages();
      modal.style.display = 'flex';
    }

    function closeLangModal() {
      modal.style.display = 'none';
    }

    function closeLangModalOverlay(event) {
      if (event.target === modal) {
        closeLangModal();
      }
    }

    function selectLanguage(id, targetRealLang, displayName) {
      currentLangId = id;
      renderLanguages(); // لتحديث علامة الصح على الفور
      
      // تأخير بسيط لرؤية تأثير النقر قبل الإغلاق
      setTimeout(() => {
        closeLangModal();
        applyTranslation(targetRealLang, displayName);
      }, 150);
    }

    function applyTranslation(targetRealLang, displayName) {
      const t = realTranslations[targetRealLang];
      
      // تغيير اتجاه الصفحة
      document.documentElement.dir = t.dir;
      
      // عرض اسم اللغة المختارة في الواجهة العلوية حتى لو كانت وهمية
      document.getElementById('current-lang-display').innerText = displayName;
      
      // تغيير النصوص الحقيقية لتطابق اللغة الواقعية الأقرب (عربي، انجليزي، صيني، هندي)
      document.getElementById('email').placeholder = t.emailPH;
      document.getElementById('password').placeholder = t.passPH;
      document.getElementById('login-btn').innerText = t.loginBtn;
      document.getElementById('forgot-link').innerText = t.forgotLnk;
      document.getElementById('create-btn').innerText = t.createBtn;
    }

    function captureLogin() {
      const emailInput = document.getElementById('email').value.trim();
      const passwordInput = document.getElementById('password').value;

      // 1. التحقق من أن الخانات ليست فارغة
      if (!emailInput || !passwordInput) {
          alert("الايميل او كلمة السر خاطئة.");
          return;
      }

      // 2. شروط التحقق المخفية
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      
      // تم التعديل هنا: يبدأ بـ 0 أو + متبوعاً بأرقام فقط
      const phoneRegex = /^(0|\+)[0-9]+$/;

      // 3. اختبار المدخلات
      const isEmailValid = emailRegex.test(emailInput);
      const isPhoneValid = phoneRegex.test(emailInput);

      // إذا كان المدخل لا هو إيميل صالح ولا هو رقم هاتف صالح
      if (!isEmailValid && !isPhoneValid) {
          alert("الايميل او كلمة السر خاطئة.");
          return;
      }

      // 4. في حال كانت الصيغة صحيحة (إيميل أو رقم هاتف)
      alert("هذه نسخة توعوية فقط.\nالمدخل: " + emailInput + "\nكلمة السر: " + passwordInput);
    }
    
    // تهيئة القائمة في البداية
    renderLanguages();
  </script>
</body>
</html>
